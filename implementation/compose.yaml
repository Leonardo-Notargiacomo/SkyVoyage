services:
  backend:
    container_name: prj2-09-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - ./backend/.env
#    depends_on:
#      - db

#  db:
#    image: postgres:13
#    container_name: prj2-09-db
#    environment:
#      POSTGRES_DB: aisdb
#      POSTGRES_USER: aisdemouser
#      POSTGRES_PASSWORD: ais
#    ports:
#      - "5432:5432"
#    volumes:
#      - db_data:/var/lib/postgresql/data

  frontend:
    container_name: prj2-09-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - PUBLIC_API_BASE=http://localhost:8080/api/v1
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  db_data:
